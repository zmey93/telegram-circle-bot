services:
  bot:
    build: .
    container_name: circle_bot
    restart: unless-stopped
    env_file:
      - /opt/circlebot/.env
    environment:
      - TZ=Europe/Moscow
    volumes:
      - /opt/circlebot/temp:/app/temp
      - /etc/localtime:/etc/localtime:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
